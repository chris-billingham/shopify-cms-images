services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      CMS_HOST: ${CMS_HOST:-http://localhost}
      PREVIEW_HOST: ${PREVIEW_HOST:-http://preview.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  app:
    build: ./backend
    expose:
      - "3000"
    env_file: .env
    volumes:
      - thumbs:/app/thumbnails
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["node", "dist/src/worker.js"]
    env_file: .env
    volumes:
      - thumbs:/app/thumbnails
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: rclone-based backup sync.
  # Only starts when the "backup" profile is active:
  #   docker compose --profile backup up -d
  backup-sync:
    profiles: [backup]
    image: rclone/rclone:latest
    volumes:
      - ./backups:/backups:ro
      - ./rclone.conf:/config/rclone/rclone.conf:ro
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        rclone sync /backups remote:cms-backups
          --config /config/rclone/rclone.conf --log-level INFO;
        sleep 3600;
      done"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  thumbs:
